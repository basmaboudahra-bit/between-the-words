<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>between the words</title>

<style>

body{
    margin:0;
    padding:0;
    font-family:"Georgia", serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    overflow:hidden;

    /* 🖤 خلفية أبيض وأسود */
    background-image: url("background.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;

    filter: grayscale(100%) contrast(120%);
}

/* 🌑 تغميق سينمائي */
body::before{
    content:"";
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    pointer-events:none;
}

/* 🌫️ vignette إضافي */
body::after{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:radial-gradient(circle, transparent 40%, rgba(0,0,0,0.75));
    pointer-events:none;
}

/* 🔐 شاشة القفل */
#lockScreen{
    position:fixed;
    width:100%;
    height:100%;
    background:#0d0d0d;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:#f5f5f5;
}

input{
    padding:10px;
    font-size:18px;
    text-align:center;
    border:none;
    outline:none;
    background:#f5f5f5;
    font-family:"Georgia", serif;
    letter-spacing:2px;
}

button{
    margin-top:10px;
    padding:10px 20px;
    background:#2b2b2b;
    color:#f5f5f5;
    border:none;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#444;
}

/* 📜 الورقة */
.letter{
    width:70%;
    max-width:800px;
    background:#f2f2f2;
    padding:60px;
    border:10px solid #2b2b2b;
    position:relative;
    box-shadow:0 0 60px rgba(0,0,0,0.85);
    display:none;
    animation: fadeIn 2s ease;
}

/* ✨ وميض خفيف */
.letter::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(255,255,255,0.05);
    animation:flicker 3s infinite;
    pointer-events:none;
}

@keyframes flicker{
    0%,100%{opacity:0.05;}
    50%{opacity:0.12;}
}

/* ✍️ النص */
h1{
    text-align:center;
    letter-spacing:3px;
}

p{
    font-size:18px;
    line-height:1.8;
    color:#1f1f1f;
    white-space:pre-wrap;
}

/* ⌨️ مؤشر الكتابة */
#typedText::after{
    content:"|";
    animation: blink 0.8s infinite;
}

@keyframes blink{
    50%{opacity:0;}
}

/* 🌟 ظهور */
@keyframes fadeIn{
    from{opacity:0;}
    to{opacity:1;}
}

</style>
</head>

<body>

<!-- 🔐 شاشة القفل -->
<div id="lockScreen">
    <h2> : راني نشم ريحة </h2>
    <input type="text" id="password">
    <button onclick="checkPassword()">Unlock</button>
</div>

<!-- 📜 الرسالة -->
<div class="letter" id="letter">
<h1>between the words</h1>
<p id="typedText"></p>
</div>

<!-- 🎼 صوت -->
<audio id="bgMusic" loop>
    <source src="victorian.mp3" type="audio/mpeg">
</audio>

<script>

/* 🔐 فتح القفل */
function checkPassword(){
    let pass = document.getElementById("password").value;

    if(pass === "كاران"){
        document.getElementById("lockScreen").style.display = "none";
        document.getElementById("letter").style.display = "block";

        let music = document.getElementById("bgMusic");
        music.volume = 0.5;
        music.play().catch(()=>{});

        startLetter();
    } else {
        alert("The word is not correct...");
    }
}

/* ⌨️ كتابة ببطء مع توقفات */
function typeWriterWithPauses(text, element, speed=40){
    let i = 0;

    function type(){
        if(i < text.length){

            element.innerHTML += text[i];

            if(text[i] === "."){
                setTimeout(type, 600 + Math.random()*400);
            }
            else if(text[i] === ","){
                setTimeout(type, 250 + Math.random()*200);
            }
            else if(text[i] === "\n"){
                setTimeout(type, 900);
            }
            else{
                setTimeout(type, speed);
            }

            i++;
        }
    }

    type();
}

/* ✨ تشغيل الرسالة */
function startLetter(){
    let text = document.getElementById("typedText");

    let message =
`A friendship that brings us together, and memories that bind us, and between one word and another I discover a thousand unspoken feelings.

Writing letters to you is no longer just a casual greeting or a simple thank-you; it has become an attempt to gather everything I fail to say in every moment. Every time I write, I feel that words are not enough, and that what is inside me is greater than the limits of language itself.

I write… then erase… then write again, as if I am searching for a final version that could do you justice, but I never find it.
Because the whole world, with all its words, feels too small when I try to describe you.

And so… look between the words.`;

    typeWriterWithPauses(message, text, 45);
}

</script>

</body>
</html>
